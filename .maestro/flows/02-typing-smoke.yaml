appId: com.onern.starter
name: "Typing Smoke — full CET4 chapter to result screen"
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        id: "login-skip-dev"
    commands:
      - tapOn:
          id: "login-skip-dev"

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 12000

- assertVisible:
    id: "dictionary-picker"

- takeScreenshot: /tmp/maestro-debug/01-home-dict-picker

- tapOn:
    id: "dict-item-CET4_T"

- extendedWaitUntil:
    visible:
      id: "typing-screen"
    timeout: 8000

- assertVisible:
    id: "typing-input"

- takeScreenshot: /tmp/maestro-debug/02-typing-screen-word1

- tapOn:
    id: "typing-input"
- eraseText
- inputText: "cancel"
- extendedWaitUntil:
    visible: "2 / 10"
    timeout: 6000

- tapOn:
    id: "typing-input"
- eraseText
- inputText: "explosive"
- extendedWaitUntil:
    visible: "3 / 10"
    timeout: 6000

- tapOn:
    id: "typing-input"
- eraseText
- inputText: "numerous"
- extendedWaitUntil:
    visible: "4 / 10"
    timeout: 6000

- tapOn:
    id: "typing-input"
- eraseText
- inputText: "govern"
- extendedWaitUntil:
    visible: "5 / 10"
    timeout: 6000

- tapOn:
    id: "typing-input"
- eraseText
- inputText: "analyse"
- extendedWaitUntil:
    visible: "6 / 10"
    timeout: 6000

- takeScreenshot: /tmp/maestro-debug/03-mid-progress-6of10

- tapOn:
    id: "typing-input"
- eraseText
- inputText: "discourage"
- extendedWaitUntil:
    visible: "7 / 10"
    timeout: 6000

- tapOn:
    id: "typing-input"
- eraseText
- inputText: "resemble"
- extendedWaitUntil:
    visible: "8 / 10"
    timeout: 6000

- tapOn:
    id: "typing-input"
- eraseText
- inputText: "remote"
- extendedWaitUntil:
    visible: "9 / 10"
    timeout: 6000

- tapOn:
    id: "typing-input"
- eraseText
- inputText: "salary"
- extendedWaitUntil:
    visible: "10 / 10"
    timeout: 6000

- tapOn:
    id: "typing-input"
- eraseText
- inputText: "pollution"

- extendedWaitUntil:
    visible:
      id: "result-screen"
    timeout: 10000

- takeScreenshot: /tmp/maestro-debug/04-result-screen

- assertVisible:
    id: "result-restart"
- assertVisible:
    id: "result-exit"
